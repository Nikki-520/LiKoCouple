    z-index: 100

/* Heart Cursor */
#custom-cursor {
    position: fixed;
    width: 24px;
    height: 24px;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    color: #FFAB76;
    filter: drop-shadow(0 2px 4px rgba(255, 171, 118, 0.4))
    }
.particle {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    border-radius: 50%
    }
/* 3D Book Container */
.book-container {
    perspective: 2000px;
    width: 340px;
    height: 480px;
    max-width: 90vw;
    max-height: 80vh
    }
.book {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1);
    cursor: pointer
    }
.book.open {
    transform: rotatey(-180deg) translatex(50%)
    }
.book-page {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    backface-visibility: hidden;
    border-radius: 8px 24px 24px 8px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1)
    }
.book-front {
    z-index: 2;
    background: #FFF5F0;
    transform-origin: left;
    transition: transform 1.2s;
    overflow: hidden;
    border: 2px solid #F5D6C6
    }
.book-back {
    background: #FFF8F5;
    transform: rotatey(180deg);
    z-index: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border: 2px solid #F5D6C6;
    text-align: center
    }
/* Wobbly Border Effect */
.wobbly-border {
    border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
    border: 2px solid #FFAB76
    }
/* Atmospheric Drift Particles */
.floating-element {
    position: absolute;
    pointer-events: none;
    opacity: 0.3
    }
@keyframes drift {
    0% {
        transform: translateY(0) rotate(0deg);
        } 50% {
        transform: translateY(-20px) rotate(5deg);
        } 100% {
        transform: translateY(0) rotate(0deg);
        }
    }
.drift {
    animation: drift 6s ease-in-out infinite
    }</style>

<body class="paper-grain selection:bg-secondary-fixed">

<script>
        // Custom Cursor Logic
        const cursor = document.getElementById('custom-cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // Particle Generation
            if (Math.random() > 0.85) {
                createParticle(e.clientX, e.clientY);
            }
        });

        function animateCursor() {
            let dx = mouseX - cursorX;
            let dy = mouseY - cursorY;
            cursorX += dx * 0.15;
            cursorY += dy * 0.15;
            cursor.style.left = `${cursorX}px`;
            cursor.style.top = `${cursorY}px`;
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        function createParticle(x, y) {
            const p = document.createElement('div');
            p.className = 'particle material-symbols-outlined';
            p.textContent = Math.random() > 0.5 ? 'favorite' : 'sparkle';
            p.style.left = `${x}px`;
            p.style.top = `${y}px`;
            p.style.fontSize = `${Math.random() * 10 + 5}px`;
            p.style.color = Math.random() > 0.5 ? '#FFAB76' : '#FFE4D6';
            p.style.opacity = '1';
            document.body.appendChild(p);

            gsap.to(p, {
                y: y + (Math.random() - 0.5) * 100,
                x: x + (Math.random() - 0.5) * 100,
                opacity: 0,
                rotation: Math.random() * 360,
                duration: 1.5 + Math.random(),
                onComplete: () => p.remove()
            });
        }

        // Book Animation Logic
        const book = document.getElementById('diary-book');
        const instruction = document.getElementById('instruction');
        let isOpen = false;

        book.addEventListener('click', () => {
            if (!isOpen) {
                book.classList.add('open');
                instruction.style.opacity = '0';
                
                // Trigger "Bloom" effect on particles
                for(let i=0; i<20; i++) {
                    setTimeout(() => {
                        createParticle(window.innerWidth/2, window.innerHeight/2);
                    }, i * 50);
                }
                
                isOpen = true;
            } else {
                // Potential redirect or further navigation
                gsap.to('main', {
                    opacity: 0,
                    scale: 1.1,
                    duration: 0.8,
                    onComplete: () => {
                        console.log("Navigating to home...");
                        // window.location.href = "/home"; // Simulated
                    }
                });
            }
        });

        // Hover Effect interaction for cursor
        book.addEventListener('mouseenter', () => {
            gsap.to(cursor, { scale: 1.5, duration: 0.3 });
            cursor.textContent = 'auto_stories';
        });

        book.addEventListener('mouseleave', () => {
            gsap.to(cursor, { scale: 1, duration: 0.3 });
            cursor.textContent = 'favorite';
        });

    </script>
